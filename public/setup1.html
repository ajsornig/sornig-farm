<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layout Option 1: Grid View Toggle</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #FDF6E3; font-family: Georgia, serif; padding: 1rem; }
    h1 { color: #8B2500; margin-bottom: 0.5rem; font-size: 1.5rem; }
    p { color: #5D4037; margin-bottom: 1rem; }
    .toggle-btn {
      padding: 0.6rem 1.2rem;
      background: #2D5A27;
      color: #FDF6E3;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    .toggle-btn:hover { background: #3d7a37; }

    .single-view video { width: 100%; max-width: 800px; border-radius: 12px; border: 4px solid #2D5A27; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 0; }
    .tab {
      padding: 0.5rem 1rem;
      background: #5D4037;
      color: #FDF6E3;
      border: none;
      border-radius: 8px 8px 0 0;
      cursor: pointer;
    }
    .tab.active { background: #2D5A27; }

    .grid-view {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      max-width: 1200px;
    }
    .grid-view .cam-card {
      border: 4px solid #2D5A27;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .grid-view .cam-card:hover { transform: scale(1.02); }
    .grid-view video { width: 100%; display: block; }
    .grid-view .cam-label {
      background: #2D5A27;
      color: #FDF6E3;
      padding: 0.4rem 0.8rem;
      font-size: 0.9rem;
      text-align: center;
    }

    .hidden { display: none; }

    @media (max-width: 768px) {
      .grid-view { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <h1>Option 1: Grid View Toggle</h1>
  <p>A button switches between single-cam and side-by-side grid. Click a grid cell to go full-size.</p>

  <button class="toggle-btn" onclick="toggleView()">Switch to Grid View</button>

  <div id="single" class="single-view">
    <div class="tabs">
      <button class="tab active" onclick="switchCam('run', this)">Chicken Run</button>
      <button class="tab" onclick="switchCam('coop', this)">Chicken Coop</button>
    </div>
    <video id="single-video" controls autoplay muted></video>
  </div>

  <div id="grid" class="grid-view hidden">
    <div class="cam-card" onclick="selectFromGrid('run')">
      <video id="grid-video-1" autoplay muted></video>
      <div class="cam-label">Chicken Run</div>
    </div>
    <div class="cam-card" onclick="selectFromGrid('coop')">
      <video id="grid-video-2" autoplay muted></video>
      <div class="cam-label">Chicken Coop</div>
    </div>
  </div>

  <script>
    const streams = { run: '/hls/stream.m3u8', coop: '/hls2/stream.m3u8' };
    let currentCam = 'run';
    let isGrid = false;
    let players = {};

    function createHls(videoEl, url) {
      if (players[videoEl.id]) { players[videoEl.id].destroy(); }
      const hls = new Hls({ enableWorker: true, lowLatencyMode: false });
      hls.loadSource(url);
      hls.attachMedia(videoEl);
      hls.on(Hls.Events.MANIFEST_PARSED, () => videoEl.play().catch(() => {}));
      players[videoEl.id] = hls;
    }

    function switchCam(cam, btn) {
      currentCam = cam;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      createHls(document.getElementById('single-video'), streams[cam]);
    }

    function toggleView() {
      isGrid = !isGrid;
      document.getElementById('single').classList.toggle('hidden', isGrid);
      document.getElementById('grid').classList.toggle('hidden', !isGrid);
      document.querySelector('.toggle-btn').textContent = isGrid ? 'Switch to Single View' : 'Switch to Grid View';

      if (isGrid) {
        createHls(document.getElementById('grid-video-1'), streams.run);
        createHls(document.getElementById('grid-video-2'), streams.coop);
      } else {
        if (players['grid-video-1']) { players['grid-video-1'].destroy(); delete players['grid-video-1']; }
        if (players['grid-video-2']) { players['grid-video-2'].destroy(); delete players['grid-video-2']; }
        createHls(document.getElementById('single-video'), streams[currentCam]);
      }
    }

    function selectFromGrid(cam) {
      currentCam = cam;
      toggleView();
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && cam === 'run') || (i === 1 && cam === 'coop'));
      });
    }

    createHls(document.getElementById('single-video'), streams[currentCam]);
  </script>
</body>
</html>
