<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sornig Farm - Live Chicken Cam</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐔</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <header>
    <div class="logo-section">
      <span class="logo-icon">🐔</span>
      <div class="logo-text">
        <h1>Sornig Farm</h1>
        <span class="tagline">Live from the coop</span>
      </div>
    </div>
    <div id="user-area">
      <div id="weather-widget" class="hidden"></div>
      <span id="viewer-count"></span>
      <span id="night-mode-badge" class="hidden">Night Vision</span>
      <span id="user-status"></span>
      <button id="change-password-btn" class="hidden">Change Password</button>
      <button id="notify-btn" title="Chat notifications">🔔</button>
      <button id="logout-btn" class="hidden">Logout</button>
    </div>

    <div id="change-password-modal" class="modal hidden">
      <div class="modal-content">
        <h3>Change Password</h3>
        <div class="password-field">
          <input type="password" id="current-password" placeholder="Current password">
          <button type="button" class="toggle-password" data-target="current-password">👁</button>
        </div>
        <div class="password-field">
          <input type="password" id="new-password" placeholder="New password">
          <button type="button" class="toggle-password" data-target="new-password">👁</button>
        </div>
        <div class="password-field">
          <input type="password" id="confirm-password" placeholder="Confirm new password">
          <button type="button" class="toggle-password" data-target="confirm-password">👁</button>
        </div>
        <div class="modal-buttons">
          <button id="change-password-submit">Change</button>
          <button id="change-password-cancel">Cancel</button>
        </div>
        <p id="change-password-error" class="hidden"></p>
      </div>
    </div>
  </header>

  <main>
    <div id="video-container">
      <div id="camera-tabs"></div>
      <div id="video-wrapper">
        <video id="video-player" controls autoplay muted></video>
        <div id="video-overlay" class="hidden">
          <p>Camera Offline</p>
        </div>
      </div>
    </div>

    <aside id="chat-container">
      <div id="chat-header">
        <span>Coop Chat</span>
        <button id="admin-clear-btn" class="admin-btn hidden" title="Clear all chat">Clear</button>
      </div>
      <div id="chat-messages"></div>

      <div id="auth-section">
        <div id="account-form">
          <input type="text" id="auth-username" placeholder="Username" maxlength="20">
          <div class="password-field">
            <input type="password" id="auth-password" placeholder="Password">
            <button type="button" class="toggle-password" data-target="auth-password">👁</button>
          </div>
          <input type="email" id="auth-email" placeholder="Email (for approval notification)">
          <div class="auth-buttons">
            <button id="login-btn">Login</button>
            <button id="register-btn">Register</button>
          </div>
          <a href="#" id="forgot-password-link" class="forgot-link">Forgot Password?</a>
        </div>

        <div id="forgot-form" class="hidden">
          <input type="email" id="forgot-email" placeholder="Your registered email">
          <button id="forgot-submit-btn">Send Reset Link</button>
          <a href="#" id="forgot-back-link" class="forgot-link">Back to login</a>
        </div>

        <div id="auth-error" class="hidden"></div>
      </div>

      <div id="chat-input-area" class="hidden">
        <input type="text" id="chat-input" placeholder="Say something..." maxlength="500">
        <button id="send-btn">Send</button>
      </div>
    </aside>
  </main>

  <section id="recordings-section">
    <h2>Past Recordings</h2>
    <div id="recordings-list"></div>
  </section>

  <section id="visitors-section">
    <h2>Visitor Map</h2>
    <div id="total-views"></div>
    <div id="visitor-map"></div>
  </section>

  <footer>
    <p>Welcome to the Sornig Farm! Watch our chickens live, 24/7.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
